<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>云处村人民政府门户网站</title>
  <link rel="stylesheet" href="css/gov.css">
</head>
<body>

<!-- 顶部信息栏 -->
<div id="top-bar">
  <div class="top-bar-inner">
    <div class="top-bar-left">云处村人民政府门户网站 &nbsp;|&nbsp; 今天是：<span id="today-date"></span></div>
  </div>
</div>

<!-- 头部 -->
<header id="site-header">
  <div class="header-inner">
    <div class="header-logo">
      <div class="logo-emblem">⊙</div>
      <div class="logo-text">
        <div class="logo-title">云处村人民政府</div>
        <div class="logo-sub">YUNCHU VILLAGE PEOPLE'S GOVERNMENT</div>
      </div>
    </div>
  </div>
</header>

<!-- 导航栏 -->
<nav id="main-nav">
  <div class="nav-inner">
    <a href="yunchu-gov.html" class="nav-item active">首页</a>
    <a href="#" class="nav-item" id="nav-news">政务新闻</a>
    <a href="#" class="nav-item" id="nav-village">村务管理</a>
    <a href="archive.html" class="nav-item" id="nav-archive">档案资料</a>
    <a href="about.html" class="nav-item" id="nav-about">走进云处</a>
    <a href="contact.html" class="nav-item" id="nav-contact">联系方式</a>
  </div>
</nav>

<!-- 主体 -->
<main id="main-content">

  <!-- Hero Banner -->
  <div id="hero-banner">
    <img src="images/yunchu-bg.jpeg" alt="云处村" id="hero-img">
    <div id="hero-overlay">
      <div id="hero-text">
        <h1>云处村人民政府</h1>
        <p>山水之间，处以为家</p>
      </div>
    </div>
  </div>

  <!-- 通知公告 -->
  <div class="content-row">
    <div class="content-card" id="card-notice" style="flex:1;">
      <div class="card-header">
        <span class="card-title">通知公告</span>
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="notice-tabs">
            <span class="notice-tab active" data-type="all">全部</span>
            <span class="notice-tab" data-type="top">紧急</span>
            <span class="notice-tab" data-type="notice">通知</span>
            <span class="notice-tab" data-type="pub">公示</span>
          </div>
          <a href="#" class="card-more">更多 &gt;</a>
        </div>
      </div>
      <div id="notice-list"></div>
    </div>
  </div>


</main>

<!-- 底部 -->
<footer id="site-footer">
  <div class="footer-inner">
    <div class="footer-info">
      <p>主办单位：云处村村民委员会 &nbsp;|&nbsp; 技术支持：县政务信息中心</p>
      <p>地址：[已屏蔽] &nbsp;|&nbsp; 邮编：[已屏蔽] &nbsp;|&nbsp; 联系电话：[已屏蔽]</p>
    </div>
    <div class="footer-links">
      <a href="#">网站地图</a>
      <a href="#">隐私声明</a>
      <a href="#">版权声明</a>
    </div>
  </div>
  <div class="footer-bottom">
    © 1998 云处村人民政府 &nbsp;|&nbsp; 浙ICP备 [已屏蔽] 号
  </div>
</footer>

<!-- 搜索无结果提示 -->
<div id="gov-search-tip" style="display:none;"></div>

<script>
// 日期显示
var d = new Date();
document.getElementById('today-date').textContent =
  d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';

// ===== 通知公告数据 =====
var noticeData = [
  { date:'2025-06-10', title:'关于举办"凤凰归巢"夏至观测仪式的通知', url:'notice-1.html', type:'notice', top:true,  summary:'定于2025年6月21日夏至当日举办第128届凤凰归巢观测仪式，请各组配合做好接待工作。' },
  { date:'2025-05-28', title:'云处村道路修缮施工通告',                  url:'notice-2.html', type:'notice', top:false, summary:'村主干道自6月1日起进行路面修缮，施工期间请绕行西侧小路，预计工期15天。' },
  { date:'2025-05-12', title:'关于开展春耕农业技术培训的通知',          url:'notice-3.html', type:'notice', top:false, summary:'定于5月20日在村委会大院举办春耕农业技术培训，欢迎有需要的村民参加。' },
  { date:'2025-04-30', title:'云处村饮用水安全检测结果公示',            url:'notice-4.html', type:'pub',    top:false, summary:'经县卫生监督所检测，全村饮用水各项指标均符合国家标准，结果向全体村民公示。' },
  { date:'2025-04-15', title:'关于清明节期间防火工作的紧急通知',        url:'notice-5.html', type:'top',    top:true,  summary:'清明节期间严禁在山林周边燃放烟花爆竹及野外用火，违者依法追究责任。' }
];

var currentNoticeType = 'all';

var typeLabel = { notice:'通知', pub:'公示', top:'紧急' };
var typeColor = { notice:'#2a6e3f', pub:'#1a5a8a', top:'#c0392b' };
var typeBg    = { notice:'rgba(42,110,63,0.08)', pub:'rgba(26,90,138,0.08)', top:'rgba(192,57,43,0.08)' };

function renderNotices(type) {
  var list = noticeData.filter(function(n) { return type === 'all' || n.type === type || (type === 'top' && n.top); });
  var el = document.getElementById('notice-list');
  el.innerHTML = '';
  list.forEach(function(n) {
    var row = document.createElement('a');
    row.href = n.url;
    row.className = 'notice-row';
    row.innerHTML =
      '<div class="notice-row-left">' +
        (n.top ? '<span class="notice-badge top">紧急</span>' : '') +
        '<span class="notice-badge" style="color:' + typeColor[n.type] + ';background:' + typeBg[n.type] + ';border-color:' + typeColor[n.type] + '33;">' + typeLabel[n.type] + '</span>' +
        '<span class="notice-title">' + n.title + '</span>' +
      '</div>' +
      '<div class="notice-row-right">' +
        '<span class="notice-summary">' + n.summary + '</span>' +
        '<span class="notice-date">' + n.date + '</span>' +
      '</div>';
    el.appendChild(row);
  });
}

renderNotices('all');

// Tab 切换
document.querySelectorAll('.notice-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.notice-tab').forEach(function(t) { t.classList.remove('active'); });
    this.classList.add('active');
    currentNoticeType = this.getAttribute('data-type');
    renderNotices(currentNoticeType);
  });
});


// 政务新闻列表数据
var newsList = [
  { date: '2025-06-14', title: '村委会召开夏至观测仪式筹备会议', url: 'news-1.html' },
  { date: '2025-06-08', title: '云处村荣获县级"文明村落"称号', url: 'news-2.html' },
  { date: '2025-05-20', title: '我村积极推进畲族传统文化保护工作', url: 'news-3.html' },
  { date: '2025-05-05', title: '春季农业生产工作稳步推进', url: 'news-4.html' },
  { date: '2025-07-07', title: '（转载）浙江省农业农村厅关于做好2025年部级乡村产业振兴带头人培育《领航鸟计划》招生工作的通知', url: 'news-6.html' },
  { date: '2025-04-22', title: '云处村开展党员教育学习活动', url: 'news-5.html' }
];

var newsExpanded = false;

document.getElementById('nav-news').addEventListener('click', function(e) {
  e.preventDefault();
  newsExpanded = !newsExpanded;

  var navItems = document.querySelectorAll('.nav-item');
  for (var i = 0; i < navItems.length; i++) {
    navItems[i].classList.remove('active');
  }
  if (newsExpanded) {
    this.classList.add('active');
    showNewsPanel();
  } else {
    document.querySelector('.nav-item[href="yunchu-gov.html"]').classList.add('active');
    hideNewsPanel();
  }
});

// 点击其他导航项时，重置新闻面板状态
var otherNavItems = document.querySelectorAll('.nav-item:not(#nav-news):not(#nav-village)');
for (var ni = 0; ni < otherNavItems.length; ni++) {
  otherNavItems[ni].addEventListener('click', function() {
    newsExpanded = false;
    hideNewsPanel();
  });
}

function setHomepageVisible(visible) {
  var els = ['hero-banner', 'card-notice', 'card-links'];
  for (var i = 0; i < els.length; i++) {
    var el = document.getElementById(els[i]);
    if (el) el.style.display = visible ? '' : 'none';
  }
  // 隐藏/显示 content-row
  var rows = document.querySelectorAll('.content-row');
  for (var j = 0; j < rows.length; j++) {
    rows[j].style.display = visible ? '' : 'none';
  }
}

function showNewsPanel() {
  setHomepageVisible(false);

  var existing = document.getElementById('news-panel');
  if (existing) { existing.style.display = 'block'; return; }

  var panel = document.createElement('div');
  panel.id = 'news-panel';

  var header = document.createElement('div');
  header.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:16px;';
  header.innerHTML = '<span style="display:inline-block;width:4px;height:20px;background:#2a6e3f;border-radius:2px;"></span>' +
    '<span style="font-size:17px;font-weight:bold;color:#1a3a28;letter-spacing:1px;">政务新闻</span>';

  var grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:14px;';

  // 摘要文本（与文章内容对应）
  var summaries = [
    '村委会就第128届夏至观测仪式各项筹备工作进行专题部署，重点讨论观测台修缮及外来访客管理方案。',
    '我村以综合评分第三名荣获2025年度县级"文明村落"称号，这是连续第七年获此殊荣。',
    '村委会积极推进传承人档案建立、口述历史记录及传统服饰复原等多项保护工作。',
    '今年春季水稻播种工作基本完成，山地蔬菜长势良好，农田水利设施完成维修。',
    '浙江省农业农村厅面向全省开展2025年部级乡村产业振兴带头人培育招生，云处村列入项目村庄名单（编号20260003）。',
    '党支部组织2025年第一季度党员教育学习，以"党建引领乡村振兴"为主题开展交流。'
  ];

  for (var i = 0; i < newsList.length; i++) {
    var item = newsList[i];
    var card = document.createElement('a');
    card.href = item.url;
    card.style.cssText = 'display:block;background:#fff;border:1px solid #d4e8d8;border-top:3px solid #2a6e3f;padding:18px 16px 14px;text-decoration:none;color:inherit;transition:box-shadow 0.15s,transform 0.15s;cursor:pointer;';
    card.innerHTML =
      '<div style="font-size:11px;color:#aaa;font-family:\'Courier New\',monospace;margin-bottom:8px;">' + item.date + '</div>' +
      '<div style="font-size:14px;font-weight:bold;color:#1a3a28;line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">' + item.title + '</div>' +
      '<div style="font-size:12px;color:#777;line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">' + summaries[i] + '</div>' +
      '<div style="margin-top:12px;font-size:12px;color:#2a6e3f;letter-spacing:0.5px;">查看详情 &rsaquo;</div>';
    card.onmouseover = function() {
      this.style.boxShadow = '0 4px 16px rgba(42,110,63,0.12)';
      this.style.transform = 'translateY(-2px)';
    };
    card.onmouseout = function() {
      this.style.boxShadow = '';
      this.style.transform = '';
    };
    grid.appendChild(card);
  }

  panel.appendChild(header);
  panel.appendChild(grid);

  var mainContent = document.getElementById('main-content');
  mainContent.insertBefore(panel, mainContent.firstChild);
}

function hideNewsPanel() {
  var panel = document.getElementById('news-panel');
  if (panel) panel.style.display = 'none';
  setHomepageVisible(true);
}

// 村务管理：无权限提示
document.getElementById('nav-village').addEventListener('click', function(e) {
  e.preventDefault();
  newsExpanded = false;
  hideNewsPanel();
  var tip = document.getElementById('gov-search-tip');
  tip.textContent = '暂无管理权限';
  tip.style.display = 'block';
  setTimeout(function() { tip.style.display = 'none'; }, 2000);
});

</script>

</body>
</html>
