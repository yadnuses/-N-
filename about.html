<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>走进云处 - 云处村人民政府</title>
  <link rel="stylesheet" href="css/gov.css">
  <style>
    .about-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    /* 页面标题 */
    .page-heading {
      text-align: center;
      padding: 36px 0 32px;
    }
    .page-heading h1 {
      font-size: 26px;
      font-weight: bold;
      color: #1a3a28;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }
    .page-heading p {
      font-size: 13px;
      color: #888;
      letter-spacing: 3px;
    }
    .page-heading .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #2a6e3f, #7abf8a);
      margin: 14px auto 0;
      border-radius: 2px;
    }

    /* ===== 主图：鸟瞰 ===== */
    .hero-full {
      position: relative;
      width: 100%;
      height: 420px;
      overflow: hidden;
      border-radius: 4px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.16);
      margin-bottom: 20px;
    }
    .hero-full img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      transition: transform 0.6s ease;
    }
    .hero-full:hover img { transform: scale(1.03); }
    .hero-full .caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(10,30,15,0.75), transparent);
      padding: 28px 28px 20px;
      color: #fff;
    }
    .hero-full .caption h2 {
      font-size: 20px;
      letter-spacing: 3px;
      font-weight: bold;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }
    .hero-full .caption p {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      margin-top: 5px;
      letter-spacing: 2px;
    }

    /* ===== 两列并排 ===== */
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    /* ===== 三列并排 ===== */
    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    /* ===== 左大右小 ===== */
    .row-featured {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    /* 通用图片卡片 */
    .img-card {
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      background: #e8f0e5;
    }
    .img-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }
    .img-card:hover img { transform: scale(1.05); }
    .img-card .caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(10,30,15,0.68), transparent);
      padding: 22px 16px 12px;
      color: #fff;
    }
    .img-card .caption span {
      font-size: 13px;
      letter-spacing: 2px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    .img-card.tall { height: 300px; }
    .img-card.medium { height: 220px; }
    .img-card.short { height: 180px; }
  </style>
</head>
<body>

<nav id="main-nav" style="border-bottom:3px solid #ffd04a;">
  <div class="nav-inner">
    <a href="yunchu-gov.html" class="nav-item">首页</a>
    <a href="#" class="nav-item">政务新闻</a>
    <a href="#" class="nav-item">村务管理</a>
    <a href="#" class="nav-item">档案资料</a>
    <a href="about.html" class="nav-item active">走进云处</a>
    <a href="contact.html" class="nav-item">联系方式</a>
  </div>
</nav>

<div class="about-container">

  <div class="page-heading">
    <h1>走进云处</h1>
    <p>山水之间，处以为家</p>
    <div class="divider"></div>
  </div>

  <!-- 主图：鸟瞰云处 -->
  <div class="hero-full">
    <img src="images/aerial.png" alt="鸟瞰云处">
    <div class="caption">
      <h2>鸟瞰云处</h2>
      <p>群山环抱，云雾缭绕，古村静卧于青山绿水之间</p>
    </div>
  </div>

  <!-- 第一行：自然风光 + 广场 -->
  <div class="row-2">
    <div class="img-card tall">
      <img src="images/nature.png" alt="自然风光">
      <div class="caption"><span>自然风光</span></div>
    </div>
    <div class="img-card tall">
      <img src="images/square.png" alt="村落广场">
      <div class="caption"><span>村落广场</span></div>
    </div>
  </div>

  <!-- 第二行：左大（民族风情）右小（畲乡民居） -->
  <div class="row-featured">
    <div class="img-card tall">
      <img src="images/ethnic.png" alt="民族风情">
      <div class="caption"><span>民族风情</span></div>
    </div>
    <div class="img-card tall">
      <img src="images/she-residence.png" alt="畲乡民居">
      <div class="caption"><span>畲乡民居</span></div>
    </div>
  </div>

  <!-- 第三行：篝火晚会 + 畲乡民居2 -->
  <div class="row-2">
    <div class="img-card medium">
      <img src="images/bonfire.png" alt="篝火晚会">
      <div class="caption"><span>篝火晚会</span></div>
    </div>
    <div class="img-card medium">
      <img src="images/she-residence2.png" alt="畲乡民居">
      <div class="caption"><span>畲乡风貌</span></div>
    </div>
  </div>

</div>
