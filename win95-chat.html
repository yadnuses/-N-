<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>网上邻居 - 聊天</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "MS Sans Serif", "Microsoft Sans Serif", "宋体", sans-serif;
      background: #008080;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Windows 95 标题栏 */
    .title-bar {
      background: linear-gradient(180deg, #1a3fbb 0%, #0d2463 100%);
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
      border-bottom: 2px solid #000;
    }

    .title-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .window-icon {
      width: 20px;
      height: 20px;
      background: #c0c0c0;
      border: 1px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .window-title {
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .title-buttons {
      display: flex;
      gap: 3px;
    }

    .win-btn {
      width: 24px;
      height: 22px;
      background: linear-gradient(180deg, #e0e0e0 0%, #a0a0a0 100%);
      border: 2px solid #fff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
    }

    .win-btn:active {
      border: 2px solid #404040;
      border-right-color: #fff;
      border-bottom-color: #fff;
    }

    /* 菜单栏 */
    .menu-bar {
      background: #c0c0c0;
      height: 26px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      border-bottom: 2px solid #808080;
      gap: 16px;
    }

    .menu-item {
      font-size: 13px;
      color: #000;
      cursor: pointer;
      padding: 2px 6px;
    }

    .menu-item:hover {
      background: #000080;
      color: #fff;
    }

    /* 聊天区域 */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 消息行 */
    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .message-row.right {
      justify-content: flex-end;
    }

    /* 头像 */
    .avatar {
      width: 48px;
      height: 48px;
      background: #c0c0c0;
      border: 2px solid #fff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .avatar.computer {
      background: #e0e0e0;
    }

    /* 消息气泡 - 左侧（灰色） */
    .bubble-left {
      background: #c0c0c0;
      border: 2px solid #fff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      padding: 10px 14px;
      max-width: 70%;
      font-size: 14px;
      color: #000;
      line-height: 1.5;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    }

    /* 消息气泡 - 右侧（蓝色） */
    .bubble-right {
      background: #000080;
      border: 2px solid #4040ff;
      border-right-color: #000040;
      border-bottom-color: #000040;
      padding: 10px 14px;
      max-width: 70%;
      font-size: 14px;
      color: #fff;
      line-height: 1.5;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    }

    /* 时间戳 */
    .timestamp {
      font-size: 11px;
      color: #808080;
      margin-top: 4px;
      text-align: right;
    }

    .bubble-right .timestamp {
      color: #a0a0ff;
    }

    /* 气泡箭头 */
    .bubble-left {
      position: relative;
    }

    .bubble-left::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 10px;
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-right: 8px solid #c0c0c0;
    }

    .bubble-right {
      position: relative;
    }

    .bubble-right::after {
      content: '';
      position: absolute;
      right: -8px;
      top: 10px;
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 8px solid #000080;
    }

    /* 像素小狗区域 */
    .pixel-dog-section {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin: 8px 0;
    }

    .speech-bubble {
      background: #ffffe0;
      border: 2px solid #000;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 14px;
      color: #000;
      margin-left: 60px;
      margin-bottom: 8px;
      position: relative;
    }

    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 30px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid #000;
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 32px;
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid #ffffe0;
      z-index: 1;
    }

    /* 像素小狗 */
    .pixel-dog {
      width: 80px;
      height: 80px;
      margin-left: 40px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* 小狗SVG */
    .pixel-dog svg {
      width: 100%;
      height: 100%;
    }

    /* 底部输入区域 */
    .input-area {
      background: #c0c0c0;
      border-top: 2px solid #fff;
      padding: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .input-box {
      flex: 1;
      background: #fff;
      border: 2px solid #404040;
      border-top-color: #000;
      border-left-color: #000;
      height: 36px;
      padding: 0 12px;
      font-size: 14px;
      display: flex;
      align-items: center;
      color: #808080;
    }

    .send-btn {
      width: 40px;
      height: 36px;
      background: linear-gradient(180deg, #e0e0e0 0%, #a0a0a0 100%);
      border: 2px solid #fff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
    }

    .send-btn:active {
      border: 2px solid #404040;
      border-right-color: #fff;
      border-bottom-color: #fff;
    }

    .toolbar-btn {
      height: 36px;
      padding: 0 12px;
      background: linear-gradient(180deg, #e0e0e0 0%, #a0a0a0 100%);
      border: 2px solid #fff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .toolbar-btn:active {
      border: 2px solid #404040;
      border-right-color: #fff;
      border-bottom-color: #fff;
    }

    /* 滚动条样式 */
    .chat-container::-webkit-scrollbar {
      width: 16px;
      background: #c0c0c0;
    }

    .chat-container::-webkit-scrollbar-thumb {
      background: #c0c0c0;
      border: 2px solid #fff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px gray;
    }

    .chat-container::-webkit-scrollbar-track {
      background: #c0c0c0;
      border-left: 1px solid #808080;
    }

    .chat-container::-webkit-scrollbar-button {
      background: #c0c0c0;
      border: 2px solid #fff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      height: 16px;
    }
  </style>
</head>
<body>
  <!-- 标题栏 -->
  <div class="title-bar">
    <div class="title-left">
      <div class="window-icon">🖥️</div>
      <span class="window-title">网上邻居</span>
    </div>
    <div class="title-buttons">
      <button class="win-btn">_</button>
      <button class="win-btn">□</button>
      <button class="win-btn">×</button>
    </div>
  </div>

  <!-- 菜单栏 -->
  <div class="menu-bar">
    <span class="menu-item">文件(F)</span>
    <span class="menu-item">编辑(E)</span>
    <span class="menu-item">查看(V)</span>
    <span class="menu-item">工具(T)</span>
    <span class="menu-item">帮助(H)</span>
  </div>

  <!-- 聊天区域 -->
  <div class="chat-container">
    <!-- 左侧消息 -->
    <div class="message-row">
      <div class="avatar computer">🖥️</div>
      <div class="bubble-left">
        <div></div>
      </div>
    </div>

    <!-- 左侧消息2 -->
    <div class="message-row">
      <div class="avatar computer">🖥️</div>
      <div class="bubble-left">
        <div></div>
        <div class="timestamp">20:25 ✓</div>
      </div>
    </div>

    <!-- 右侧消息 -->
    <div class="message-row right">
      <div class="bubble-right">
        <div></div>
      </div>
    </div>

    <!-- 右侧消息2 -->
    <div class="message-row right">
      <div class="bubble-right">
        <div></div>
      </div>
    </div>

    <!-- 右侧消息3 -->
    <div class="message-row right">
      <div class="bubble-right">
        <div></div>
        <div class="timestamp">20:26 ✓</div>
      </div>
    </div>

    <!-- 像素小狗 -->
    <div class="pixel-dog-section">
      <div class="speech-bubble"></div>
      <div class="pixel-dog">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <!-- 小狗身体 -->
          <rect x="20" y="30" width="28" height="24" fill="#FFD700" stroke="#000" stroke-width="1"/>
          <!-- 头 -->
          <rect x="16" y="14" width="24" height="20" fill="#FFD700" stroke="#000" stroke-width="1"/>
          <!-- 耳朵左 -->
          <rect x="12" y="16" width="6" height="14" fill="#FFD700" stroke="#000" stroke-width="1"/>
          <!-- 耳朵右 -->
          <rect x="38" y="16" width="6" height="14" fill="#FFD700" stroke="#000" stroke-width="1"/>
          <!-- 眼睛 -->
          <rect x="22" y="22" width="4" height="4" fill="#000"/>
          <rect x="30" y="22" width="4" height="4" fill="#000"/>
          <!-- 鼻子 -->
          <rect x="26" y="28" width="4" height="3" fill="#000"/>
          <!-- 嘴巴 -->
          <rect x="24" y="32" width="8" height="2" fill="#000"/>
          <!-- 腿 -->
          <rect x="22" y="54" width="6" height="8" fill="#FFD700" stroke="#000" stroke-width="1"/>
          <rect x="40" y="54" width="6" height="8" fill="#FFD700" stroke="#000" stroke-width="1"/>
          <!-- 尾巴 -->
          <rect x="48" y="24" width="4" height="12" fill="#FFD700" stroke="#000" stroke-width="1"/>
          <!-- 项圈 -->
          <rect x="20" y="30" width="28" height="4" fill="#FF0000" stroke="#000" stroke-width="1"/>
        </svg>
      </div>
    </div>

    <!-- 右侧消息4 -->
    <div class="message-row right">
      <div class="bubble-right">
        <div></div>
        <div class="timestamp">20:27 ✓</div>
      </div>
    </div>
  </div>

  <!-- 底部输入区域 -->
  <div class="input-area">
    <button class="toolbar-btn">语音</button>
    <div class="input-box"></div>
    <button class="toolbar-btn">☺</button>
    <button class="send-btn">+</button>
  </div>
</body>
</html>
